apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
  namespace: tickbook
  labels:
    app: event-service
    app.kubernetes.io/part-of: tickbook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
        - name: event-service
          image: ghcr.io/nmdra/tickbook/event-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: tickbook-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: tickbook-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: tickbook-config
                  key: EVENT_DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: tickbook-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tickbook-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: tickbook-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: tickbook-config
                  key: REDIS_PORT
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: tickbook-config
                  key: KAFKA_BROKERS
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: event-service
  namespace: tickbook
  labels:
    app: event-service
    app.kubernetes.io/part-of: tickbook
spec:
  selector:
    app: event-service
  ports:
    - port: 3001
      targetPort: 3001
