apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: tickbook
  labels:
    app: payment-service
    app.kubernetes.io/part-of: tickbook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: ghcr.io/nmdra/tickbook/payment-service:latest
          ports:
            - containerPort: 3004
          env:
            - name: PORT
              value: "3004"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: tickbook-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: tickbook-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: tickbook-config
                  key: PAYMENT_DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: tickbook-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tickbook-secrets
                  key: DB_PASSWORD
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: tickbook-config
                  key: KAFKA_BROKERS
            - name: BOOKING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: tickbook-config
                  key: BOOKING_SERVICE_URL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: tickbook
  labels:
    app: payment-service
    app.kubernetes.io/part-of: tickbook
spec:
  selector:
    app: payment-service
  ports:
    - port: 3004
      targetPort: 3004
