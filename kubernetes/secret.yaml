apiVersion: v1
kind: Secret
metadata:
  name: tickbook-secrets
  namespace: tickbook
  labels:
    app.kubernetes.io/part-of: tickbook
type: Opaque
stringData:
  # PostgreSQL credentials — replace with actual values before applying
  DB_USER: "pgadmin"
  DB_PASSWORD: "CHANGE_ME"

  # JWT secret for User Service
  JWT_SECRET: "CHANGE_ME"
