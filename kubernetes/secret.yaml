apiVersion: v1
kind: Secret
metadata:
  name: tickbook-secrets
  namespace: tickbook
  labels:
    app.kubernetes.io/part-of: tickbook
type: Opaque
stringData:
  # PostgreSQL credentials — MUST match the values used in Terraform variables
  DB_USER: "pgadmin"
  # IMPORTANT: Replace with the postgres_admin_password used in terraform apply
  DB_PASSWORD: "<REPLACE_WITH_POSTGRES_ADMIN_PASSWORD>"

  # JWT secret for User Service
  # Generate a secure value with: openssl rand -base64 32
  JWT_SECRET: "<REPLACE_WITH_SECURE_JWT_SECRET>"
